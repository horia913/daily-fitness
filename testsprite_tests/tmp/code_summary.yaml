features:
  - name: Client Workout Logging
    description: Clients can start assigned workouts, log sets, and complete workouts.
    files:
      - src/app/client/workouts/page.tsx
      - src/app/client/workouts/[id]/start/page.tsx
      - src/app/client/workouts/[id]/complete/page.tsx
