      - src/app/api/log-set/route.ts
      - src/app/api/complete-workout/route.ts
      - src/app/api/block-complete/route.ts
      - src/app/api/set-rpe/route.ts
    entry_route: /client/workouts
    user_interactions:
      - Select an assigned workout from the list
      - Start a workout session for a given workout
      - Log reps, weight, and RPE for each set
      - Mark blocks and the entire workout as complete
    api_calls:
      - method: POST
        endpoint: /api/program-workouts/start
      - method: POST
        endpoint: /api/log-set
      - method: POST
        endpoint: /api/block-complete
      - method: POST
        endpoint: /api/complete-workout
      - method: POST
        endpoint: /api/set-rpe
    auth_required: true
  - name: Coach Program and Template Management
    description: Coaches can create and manage training programs and workout templates for clients.
    files:
      - src/app/coach/programs/page.tsx
      - src/app/coach/programs/[id]/page.tsx
      - src/app/coach/programs/[id]/edit/page.tsx
      - src/app/coach/workouts/templates/page.tsx
      - src/app/coach/workouts/templates/create/page.tsx
      - src/app/coach/workouts/templates/[id]/page.tsx
      - src/app/api/coach/programs/route.ts
      - src/app/api/coach/workouts/templates/route.ts
    entry_route: /coach/programs
    user_interactions:
      - Open the coach programs dashboard
      - Create or edit a training program
      - Navigate to workout templates and create or edit templates
      - Assign or update templates within programs
    api_calls:
      - method: GET
        endpoint: /api/coach/programs
      - method: POST
        endpoint: /api/coach/programs
      - method: PATCH
        endpoint: /api/coach/programs
      - method: GET
        endpoint: /api/coach/workouts/templates
      - method: POST
        endpoint: /api/coach/workouts/templates
    auth_required: true
  - name: Client Check-ins and Progress Analytics
    description: Clients submit check-ins and review their progress analytics across metrics.
    files:
      - src/app/client/check-ins/page.tsx
      - src/app/client/progress/page.tsx
      - src/app/client/progress/body-metrics/page.tsx
      - src/app/client/progress/workout-logs/page.tsx
      - src/app/client/progress/analytics/page.tsx
      - src/app/api/client/dashboard/route.ts
      - src/app/api/client/program-week/route.ts
      - src/app/api/client/workouts/summary/route.ts
      - src/app/api/client/athlete-score/route.ts
    entry_route: /client/progress
    user_interactions:
      - Open the client progress hub
      - Submit a new check-in with wellness/body metrics
      - Review workout logs, analytics, and trends
    api_calls:
      - method: GET
        endpoint: /api/client/dashboard
      - method: GET
        endpoint: /api/client/program-week
      - method: GET
        endpoint: /api/client/workouts/summary
      - method: GET
        endpoint: /api/client/athlete-score
    auth_required: true
  - name: Coach Analytics and Compliance
    description: Coaches view analytics, adherence, and compliance across their client base.
    files:
      - src/app/coach/analytics/page.tsx
      - src/app/coach/reports/page.tsx
      - src/app/coach/compliance/page.tsx
      - src/app/coach/adherence/page.tsx
      - src/app/api/coach/analytics/overview/route.ts
      - src/app/api/coach/analytics/adherence/route.ts
      - src/app/api/coach/reports/clients/route.ts
      - src/app/api/coach/progress/overview/route.ts
    entry_route: /coach/analytics
    user_interactions:
      - Open the coach analytics dashboard
      - Filter or switch between adherence, compliance, and report views
      - Inspect individual or aggregated client metrics
    api_calls:
      - method: GET
        endpoint: /api/coach/analytics/overview
      - method: GET
        endpoint: /api/coach/analytics/adherence
      - method: GET
        endpoint: /api/coach/reports/clients
      - method: GET
        endpoint: /api/coach/progress/overview
    auth_required: true
